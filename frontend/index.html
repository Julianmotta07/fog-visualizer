<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FOG Visualizer</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0a0c10; --surface:#111318; --border:#1e2230; --border2:#2a3048;
    --text:#e2e8f0; --muted:#5a6480; --accent:#6C3FC5; --a-glow:rgba(108,63,197,0.18);
    --green:#34d399; --red:#f87171;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;}
  #root{min-height:100vh;display:flex;flex-direction:column;}
  .header{display:flex;align-items:center;gap:14px;padding:18px 32px;border-bottom:1px solid var(--border);background:var(--surface);}
  .header-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .header-title{font-size:18px;font-weight:800;letter-spacing:-.5px;}
  .header-sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-left:auto;}
  .layout{display:flex;flex:1;height:calc(100vh - 57px);overflow:hidden;}
  .sidebar{width:300px;min-width:300px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  .sidebar-header{padding:16px 20px 12px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
  .file-list{overflow-y:auto;flex:1;padding:8px;}
  .file-item{padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:4px;border:1px solid transparent;transition:all 0.15s ease;}
  .file-item:hover{background:rgba(108,63,197,0.06);border-color:var(--border2);}
  .file-item.active{background:var(--a-glow);border-color:var(--accent);}
  .file-name{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text);word-break:break-all;line-height:1.5;}
  .file-item.active .file-name{color:var(--accent);}
  .file-date{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-top:3px;}
  .empty-list{padding:24px 20px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}
  .main{flex:1;overflow-y:auto;padding:28px 32px;background:var(--bg);}
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--muted);}
  .empty-state-icon{font-size:48px;opacity:.3;}
  .empty-state-text{font-size:14px;}
  .meta-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:24px;display:flex;gap:32px;align-items:center;flex-wrap:wrap;}
  .meta-item{display:flex;flex-direction:column;gap:2px;}
  .meta-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
  .meta-value{font-size:14px;font-weight:600;color:var(--text);}
  .badge{display:inline-flex;align-items:center;padding:5px 12px;border-radius:20px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;border:1px solid;margin-bottom:24px;color:#6C3FC5;border-color:rgba(108,63,197,0.4);background:rgba(108,63,197,0.08);}
  .chart-container{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px 20px 16px;margin-bottom:24px;}
  .chart-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;}
  .chart-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:20px;}
  .stats-row{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;}
  .stat-card{flex:1;min-width:120px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
  .stat-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
  .stat-value{font-size:22px;font-weight:800;color:var(--text);}
  .stat-unit{font-size:11px;color:var(--muted);font-weight:400;margin-left:4px;}
  .stat-fog{color:var(--red);}
  .stat-ok{color:var(--green);}
  .loading{display:flex;align-items:center;gap:10px;padding:40px;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);}
  .spinner{width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);border-top-color:var(--accent);animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error-box{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.3);border-radius:10px;padding:16px 20px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--red);}
  .custom-tooltip{background:#1a1f2e;border:1px solid var(--border2);border-radius:8px;padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:11px;}
  .tt-time{color:var(--muted);margin-bottom:6px;}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {
  LineChart, Line, XAxis, YAxis, Tooltip,
  ResponsiveContainer, ReferenceLine, CartesianGrid
} = window.Recharts;

const { useState, useEffect, useMemo } = React;

const API = 'http://localhost:5000';

function CustomTooltip({ active, payload, label }) {
  if (!active || !payload?.length) return null;
  const prob  = payload[0]?.value;
  const isFog = prob >= 0.30;
  return (
    <div className="custom-tooltip">
      <div className="tt-time">{Number(label).toFixed(2)} s</div>
      <div style={{ color: isFog ? '#f87171' : '#34d399', fontWeight: 600 }}>
        P(FOG): {(prob * 100).toFixed(1)}%{isFog ? ' — FOG' : ''}
      </div>
    </div>
  );
}

function Stats({ chartData }) {
  const total    = chartData.length;
  const fogCount = chartData.filter(d => d.prob >= 0.30).length;
  const pct      = total > 0 ? ((fogCount / total) * 100).toFixed(1) : '0.0';
  const avg      = total > 0 ? (chartData.reduce((s, d) => s + d.prob, 0) / total * 100).toFixed(1) : '0.0';
  const dur      = total > 0 ? (chartData[total - 1]?.t || 0).toFixed(1) : '0';
  const isFog    = parseFloat(pct) > 20;

  return (
    <div className="stats-row">
      <div className="stat-card">
        <div className="stat-label">% Ventanas FOG</div>
        <div className={`stat-value ${isFog ? 'stat-fog' : 'stat-ok'}`}>
          {pct}<span className="stat-unit">%</span>
        </div>
        <div style={{fontFamily:'JetBrains Mono',fontSize:10,color:'#5a6480',marginTop:4}}>prob. media {avg}%</div>
      </div>
      <div className="stat-card">
        <div className="stat-label">Ventanas</div>
        <div className="stat-value">{total}<span className="stat-unit">total</span></div>
        <div style={{fontFamily:'JetBrains Mono',fontSize:10,color:'#5a6480',marginTop:4}}>~{dur} s duración</div>
      </div>
      <div className="stat-card">
        <div className="stat-label">Ventanas FOG</div>
        <div className={`stat-value ${fogCount > 0 ? 'stat-fog' : 'stat-ok'}`}>
          {fogCount}<span className="stat-unit">/{total}</span>
        </div>
        <div style={{fontFamily:'JetBrains Mono',fontSize:10,color:'#5a6480',marginTop:4}}>umbral ≥ 30%</div>
      </div>
    </div>
  );
}

function FogChart({ ensemble }) {
  const chartData = useMemo(() => {
    if (!ensemble || ensemble.length === 0) return [];
    const t0 = ensemble[0].timestamp;
    return ensemble.map(p => ({
      t:    parseFloat(((p.timestamp - t0) / 1000).toFixed(2)),
      prob: p.prob,
      fog:  p.fog,
    }));
  }, [ensemble]);

  if (!chartData.length) return <div className="error-box">No hay datos de ventanas disponibles.</div>;

  return (
    <>
      <Stats chartData={chartData} />
      <div className="chart-container">
        <div className="chart-title">Probabilidad FOG — Modelo Compuesto</div>
        <div className="chart-sub">wB=0.35 · wC=0.65 · Umbral: 30% · Ventana: 2s / 75% solapamiento</div>
        <ResponsiveContainer width="100%" height={340}>
          <LineChart data={chartData} margin={{top:4,right:24,left:0,bottom:32}}>
            <CartesianGrid strokeDasharray="3 6" stroke="#1e2230" />
            <XAxis
              dataKey="t" type="number" domain={['dataMin','dataMax']}
              tick={{fontFamily:'JetBrains Mono',fontSize:10,fill:'#5a6480'}}
              label={{value:'Tiempo (s)',position:'insideBottom',offset:-14,fill:'#5a6480',fontFamily:'JetBrains Mono',fontSize:11}}
            />
            <YAxis
              domain={[0,1]} tickFormatter={v=>`${(v*100).toFixed(0)}%`}
              tick={{fontFamily:'JetBrains Mono',fontSize:10,fill:'#5a6480'}} width={50}
            />
            <Tooltip content={<CustomTooltip />} isAnimationActive={false} />
            <ReferenceLine
              y={0.30} stroke="#f87171" strokeDasharray="6 3" strokeWidth={1.5}
              label={{value:'Umbral 30%',position:'insideTopRight',fill:'#f87171',fontFamily:'JetBrains Mono',fontSize:9}}
            />
            <Line
              type="monotone" dataKey="prob" name="Modelo Compuesto"
              stroke="#6C3FC5" strokeWidth={2}
              dot={false} activeDot={{r:4,strokeWidth:0}}
              isAnimationActive={false}
            />
          </LineChart>
        </ResponsiveContainer>
      </div>
    </>
  );
}

function Sidebar({ files, selected, onSelect }) {
  const parseDate = (name) => {
    const m = name.match(/^(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})(\d{2})/);
    return m ? `${m[1]}-${m[2]}-${m[3]} ${m[4]}:${m[5]}` : '';
  };
  return (
    <div className="sidebar">
      <div className="sidebar-header">Archivos DGI · {files.length}</div>
      <div className="file-list">
        {files.length === 0 && <div className="empty-list">No hay archivos JSON<br/>en la carpeta data/</div>}
        {files.map(f => (
          <div key={f} className={`file-item ${selected===f?'active':''}`} onClick={()=>onSelect(f)}>
            <div className="file-name">{f}</div>
            <div className="file-date">{parseDate(f)}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [files,    setFiles]    = useState([]);
  const [selected, setSelected] = useState(null);
  const [loading,  setLoading]  = useState(false);
  const [error,    setError]    = useState(null);
  const [result,   setResult]   = useState(null);

  useEffect(() => {
    fetch(`${API}/api/files`).then(r=>r.json()).then(d=>{
      setFiles(d.files||[]);
      if(d.files?.length) setSelected(d.files[0]);
    }).catch(()=>setFiles([]));
  }, []);

  useEffect(() => {
    if (!selected) return;
    setLoading(true); setError(null); setResult(null);
    fetch(`${API}/api/fog/${encodeURIComponent(selected)}`)
      .then(r => r.json().then(d => ({ ok: r.ok, d })))
      .then(({ ok, d }) => { if (!ok) setError(d.error||'Error'); else setResult(d); })
      .catch(e => setError(e.message))
      .finally(() => setLoading(false));
  }, [selected]);

  return (
    <>
      <div className="header">
        <div className="header-dot"/>
        <div className="header-title">FOG Visualizer</div>
        <div className="header-sub">Modelo Compuesto · wB=0.35 · wC=0.65 · Umbral 30%</div>
      </div>
      <div className="layout">
        <Sidebar files={files} selected={selected} onSelect={setSelected}/>
        <div className="main">
          {!selected && (
            <div className="empty-state">
              <div className="empty-state-icon">📂</div>
              <div className="empty-state-text">Selecciona un archivo DGI para visualizar</div>
            </div>
          )}
          {selected && loading && <div className="loading"><div className="spinner"/>Procesando modelo compuesto…</div>}
          {selected && !loading && error && <div className="error-box">⚠ {error}</div>}
          {selected && !loading && result && (
            <>
              <div className="meta-card">
                <div className="meta-item">
                  <div className="meta-label">Paciente</div>
                  <div className="meta-value">{result.meta.patient}</div>
                </div>
                <div className="meta-item">
                  <div className="meta-label">Archivo</div>
                  <div className="meta-value" style={{fontSize:11,fontFamily:'JetBrains Mono',wordBreak:'break-all'}}>
                    {result.meta.filename}
                  </div>
                </div>
              </div>
              <div className="badge">✓ Modelo Compuesto · SVM (B) + XGBoost (C)</div>
              {result.fog?.ensemble && <FogChart ensemble={result.fog.ensemble}/>}
            </>
          )}
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
